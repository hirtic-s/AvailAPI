version: '3.8'
services:
  db:
    image: postgres:16
    container_name: apimonitor_db
    environment:
      POSTGRES_DB: apimonitor
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: secret
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  backend:
    build: ./backend
    container_name: apimonitor_backend
    ports:
      - "8080:8080"
    env_file: .env
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/apimonitor
      SPRING_DATASOURCE_USERNAME: admin
      SPRING_DATASOURCE_PASSWORD: secret
    depends_on:
      - db

  frontend:
    build: ./frontend
    container_name: apimonitor_frontend
    ports:
      - "3000:80"
    environment:
      REACT_APP_API_URL: http://localhost

  nginx:
    image: nginx:alpine
    container_name: apimonitor_nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
    depends_on:
      - backend
      - frontend

volumes:
  pgdata:
