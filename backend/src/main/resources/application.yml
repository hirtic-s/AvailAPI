spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/apimonitor}
    username: ${SPRING_DATASOURCE_USERNAME:admin}
    password: ${SPRING_DATASOURCE_PASSWORD:secret}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: true
    locations: classpath:db/migration

  quartz:
    job-store-type: jdbc
    jdbc:
      initialize-schema: never
    properties:
      org.quartz.scheduler.instanceId: AUTO
      org.quartz.jobStore.class: org.quartz.impl.jdbcjobstore.JobStoreTX
      org.quartz.jobStore.driverDelegateClass: org.quartz.impl.jdbcjobstore.PostgreSQLDelegate
      org.quartz.jobStore.dataSource: quartzDS
      org.quartz.jobStore.tablePrefix: QRTZ_
      org.quartz.jobStore.isClustered: false
      org.quartz.threadPool.threadCount: 10
      org.quartz.dataSource.quartzDS.provider: hikaricp
      org.quartz.dataSource.quartzDS.driver: org.postgresql.Driver
      org.quartz.dataSource.quartzDS.URL: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/apimonitor}
      org.quartz.dataSource.quartzDS.user: ${SPRING_DATASOURCE_USERNAME:admin}
      org.quartz.dataSource.quartzDS.password: ${SPRING_DATASOURCE_PASSWORD:secret}
      org.quartz.dataSource.quartzDS.maxConnections: 5

  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME:noop}
    password: ${MAIL_PASSWORD:noop}
    properties:
      mail.smtp.auth: true
      mail.smtp.starttls.enable: true

jwt:
  secret: ${JWT_SECRET:defaultsecretfordevonly_change_in_prod_32chars}
  expiration: 86400000

server:
  port: 8080
